# ══════════════════════════════════════════════════════════════
# AS Code — Main Configuration
# ══════════════════════════════════════════════════════════════
# by Alpha Software

app:
  name: "AS Code"
  version: "0.1.0"
  description: "Fast, lightweight, general-purpose local AI runtime for real hardware"

# Server configuration
server:
  host: "127.0.0.1"
  port: 8000
  log_level: "INFO"

# Model definitions
models:
  chat:
    id: "gemma-chat"
    file: "models/gemma/gemma-3n-E2B-it-int4.litertlm"
    type: "general"
    provider: "litert_cli"
    params_billions: 2.0
    estimated_vram_mb: 1500
    quantization: "int4"
    capabilities:
      - conversation
      - planning
      - analysis
      - brainstorming
      - explanations
    source: "https://huggingface.co/litert-community/gemma-3n-E2B-it-litert-lm"
  code:
    id: "gemma-code"
    file: "models/gemma/gemma-3n-E2B-it-int4.litertlm"
    type: "coding"
    provider: "litert_cli"
    params_billions: 2.0
    estimated_vram_mb: 1500
    quantization: "int4"
    capabilities:
      - coding
      - generation
      - implementation
    source: "https://huggingface.co/litert-community/gemma-3n-E2B-it-litert-lm"

  reasoning:
    id: "gemma-reasoning"
    file: "models/gemma/gemma-3n-E2B-it-int4.litertlm"
    type: "reasoning"
    provider: "litert_cli"
    params_billions: 2.0
    estimated_vram_mb: 1500
    quantization: "int4"
    capabilities:
      - architecture
      - analysis
      - tradeoffs
      - reasoning
    source: "https://huggingface.co/litert-community/gemma-3n-E2B-it-litert-lm"

# Provider configuration
providers:
  active: "litert_cli"

  litert_cli:
    backend: "gpu"
    enable_speculative_decoding: true

  litert_compiled:
    # Stub — requires ai-edge-litert + DirectXShaderCompiler
    enabled: false

# Hardware-adaptive profiles
profiles:
  ultra_light:
    context_size: 512
    quantization: "int4"
    max_vram_mb: 1500
    active_model_policy: "single"
    swap_strategy: "aggressive"
    batch_size: 1
    concurrent_requests: 1
    kv_cache_max_mb: 128
    model_unload_timeout_sec: 120
    enable_speculative: false

  balanced:
    context_size: 2048
    quantization: "int4"
    max_vram_mb: 3200
    active_model_policy: "single"
    swap_strategy: "smart"
    batch_size: 1
    concurrent_requests: 1
    kv_cache_max_mb: 512
    model_unload_timeout_sec: 300
    enable_speculative: true

  performance:
    context_size: 4096
    quantization: "int8"
    max_vram_mb: 7000
    active_model_policy: "multi"
    swap_strategy: "none"
    batch_size: 4
    concurrent_requests: 4
    kv_cache_max_mb: 2048
    model_unload_timeout_sec: 600
    enable_speculative: true

# Inference defaults
inference:
  temperature: 0.7
  max_tokens: 1024
  top_k: 40
  top_p: 0.95
  max_context_length: 2048
